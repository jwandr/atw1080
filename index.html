    // Create a constrained path (horizontal, vertical, 45° only)
function buildSegment(p1, p2, startMode = null, endMode = null) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;

  const adx = Math.abs(dx);
  const ady = Math.abs(dy);

  const signX = Math.sign(dx);
  const signY = Math.sign(dy);

  // --- PERFECT CASES ---
  if (adx === 0 || ady === 0 || adx === ady) {
    return [p1, p2];
  }

  // --- HELPERS (ALL VALID DIRECTIONS ONLY) ---
  function diagFrom(p, d) {
    return { x: p.x + signX * d, y: p.y + signY * d };
  }

  function horizTo(p, x) {
    return { x: x, y: p.y };
  }

  function vertTo(p, y) {
    return { x: p.x, y: y };
  }

  // --- DEFAULT (no overrides) ---
  if (!startMode && !endMode) {
    // prefer 1-bend L shape
    return [
      p1,
      { x: p2.x, y: p1.y },
      p2
    ];
  }

  // --- START ONLY ---
  if (startMode && !endMode) {
    if (startMode === "horizontal") {
      return [p1, horizTo(p1, p2.x), p2];
    }

    if (startMode === "vertical") {
      return [p1, vertTo(p1, p2.y), p2];
    }

    if (startMode === "diagonal") {
      const d = Math.min(adx, ady);
      return [p1, diagFrom(p1, d), p2];
    }
  }

  // --- END ONLY ---
  if (!startMode && endMode) {
    if (endMode === "horizontal") {
      return [p1, { x: p1.x, y: p2.y }, p2];
    }

    if (endMode === "vertical") {
      return [p1, { x: p2.x, y: p1.y }, p2];
    }

    if (endMode === "diagonal") {
      const d = Math.min(adx, ady);
      return [
        p1,
        { x: p2.x - signX * d, y: p2.y - signY * d },
        p2
      ];
    }
  }

  // --- BOTH start + end ---
  // Only allow 2 bends when necessary

  const d = Math.min(adx, ady);

  // Case: both want diagonal
  if (startMode === "diagonal" && endMode === "diagonal") {
    return [p1, diagFrom(p1, d), p2];
  }

  // Otherwise build clean 3-segment path (still only valid angles)
  let mid1, mid2;

  // start segment
  if (startMode === "horizontal") {
    mid1 = horizTo(p1, p1.x + signX * 1);
  } else if (startMode === "vertical") {
    mid1 = vertTo(p1, p1.y + signY * 1);
  } else {
    mid1 = diagFrom(p1, d);
  }

  // end segment
  if (endMode === "horizontal") {
    mid2 = { x: p2.x - signX * d, y: p2.y };
  } else if (endMode === "vertical") {
    mid2 = { x: p2.x, y: p2.y - signY * d };
  } else {
    mid2 = {
      x: p2.x - signX * d,
      y: p2.y - signY * d
    };
  }

  return [p1, mid1, mid2, p2];
}

    // Rounded corners
    function roundedPath(points, radius) {
      if (points.length < 2) return "";

      let d = `M ${points[0].x} ${points[0].y}`;

      for (let i = 1; i < points.length - 1; i++) {
        const p0 = points[i - 1];
        const p1 = points[i];
        const p2 = points[i + 1];

        const dx1 = p1.x - p0.x;
        const dy1 = p1.y - p0.y;
        const dx2 = p2.x - p1.x;
        const dy2 = p2.y - p1.y;

        const len1 = Math.hypot(dx1, dy1);
        const len2 = Math.hypot(dx2, dy2);

        const r = Math.min(radius, len1 / 2, len2 / 2);

        const p1a = {
          x: p1.x - (dx1 / len1) * r,
          y: p1.y - (dy1 / len1) * r
        };

        const p1b = {
          x: p1.x + (dx2 / len2) * r,
          y: p1.y + (dy2 / len2) * r
        };

        d += ` L ${p1a.x} ${p1a.y}`;
        d += ` Q ${p1.x} ${p1.y} ${p1b.x} ${p1b.y}`;
      }

      const last = points[points.length - 1];
      d += ` L ${last.x} ${last.y}`;

      return d;
    }

    function getLabelOffset(pos) {
      const viewWidth = window.innerWidth;
      const offset = (viewWidth / 100) + 1;
      switch (pos) {
        case "above": return { dx: 0, dy: -offset, anchor: "middle" };
        case "below": return { dx: 0, dy: offset * 1.5, anchor: "middle" };
        case "left": return { dx: -offset, dy: 4, anchor: "end" };
        default: return { dx: offset, dy: 4, anchor: "start" };
      }
    }

    function drawRoutes() {
      const svg = document.getElementById("overlay");
      svg.innerHTML = "";

      const map = document.getElementById("mapImage");
      const width = map.clientWidth;
      const height = map.clientHeight;

      const showLabels = document.getElementById("toggleLabels").checked;

      routes.forEach(route => {
        const visible = document.getElementById(route.toggleId).checked;
        if (!visible) return;

        for (let i = 0; i < route.points.length - 1; i++) {
          const raw1 = route.points[i];
          const raw2 = route.points[i + 1];

          const p1 = {
            x: raw1.x * width / 100,
            y: raw1.y * height / 100
          };

          const p2 = {
            x: raw2.x * width / 100,
            y: raw2.y * height / 100
          };

          const mode = route.points[i].startMode || "diagonal";
          const startMode = route.points[i].startMode || "diagonal";
const endMode = route.points[i + 1].enterMode || "diagonal";

const constrained = buildSegment(p1, p2, startMode, endMode);

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", roundedPath(constrained, 6));
          path.setAttribute("stroke", route.color);
          path.setAttribute("stroke-width", (width/400) + 3);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke-linecap", "round");

          svg.appendChild(path);
        }

        route.points.forEach(p => {
          const cx = p.x * width / 100;
          const cy = p.y * height / 100;

          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", cx);
          circle.setAttribute("cy", cy);
          circle.setAttribute("r", (width/300)+ 2);
          circle.setAttribute("fill", "white");
          circle.setAttribute("stroke", route.color);
          circle.setAttribute("stroke-width", (width/600) + 2);
          svg.appendChild(circle);

          if (showLabels) {
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            const offset = getLabelOffset(p.labelPos);

            text.setAttribute("x", cx + offset.dx);
            text.setAttribute("y", cy + offset.dy);
            text.setAttribute("text-anchor", offset.anchor);
            text.setAttribute("class", "label");
            text.textContent = p.label;

            svg.appendChild(text);
          }
        });
      });
    }
