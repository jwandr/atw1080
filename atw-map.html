<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layered Map Toggle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 10px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin: 10px 0;
    }

    label {
      margin: 0 10px;
      cursor: pointer;
    }

    .map-container {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }

    .map-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <h1>Around The World in 1080 Days</h1>
  
  <div class="controls">
    <label><input type="checkbox" checked onchange="toggleLayer('layer1')"> Year 1</label>
    <label><input type="checkbox" checked onchange="toggleLayer('layer2')"> Year 2</label>
    <label><input type="checkbox" checked onchange="toggleLayer('layer3')"> Year 3</label>
    <label><input type="checkbox" checked onchange="toggleLayer('layer4')"> Year 4</label>
    <label><input type="checkbox" checked onchange="toggleLayer('layer5')"> Year 5</label>
  </div>

  <div class="map-container">
    <!-- Base Map -->
    <img src="maps.001.png" alt="Base Map">

    <!-- Overlay Layers -->
    <img id="layer5" class="layer" src="maps.006.png" alt="">
    <img id="layer4" class="layer" src="maps.005.png" alt="">
    <img id="layer3" class="layer" src="maps.004.png" alt="">
    <img id="layer2" class="layer" src="maps.003.png" alt="">
    <img id="layer1" class="layer" src="maps.002.png" alt="">
    
    
    
    
  </div>

  <script>
    function toggleLayer(id) {
      const layer = document.getElementById(id);
      layer.style.display = (layer.style.display === 'none') ? 'block' : 'none';
    }
  </script>

</body>
</html>
